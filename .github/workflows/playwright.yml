name: Regression Playwright Tests
on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Select Suite"
        required: true
        type: choice
        options:
          - smoke
          - regression
      browser:
        description: "Select browser to run tests"
        required: true
        default: chromium
        type: choice
        options:
          - chromium
          - firefox
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ inputs.browser }}
    - name: Run Playwright Tests
      run: npx playwright test --grep "@${{ inputs.suite }}" --project=${{ inputs.browser }}
    - name: Generate Allure Report
      run: npx allure generate allure-results --clean -o allure-report  
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
